name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  client:
    name: 🎨 Web Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (Eslint) 🔍
        run: bun run --filter web lint

      - name: Type Check (TSC) 👀
        run: bunx tsc --noEmit -p app/web/tsconfig.json

      - name: Prettier Check ✨
        run: bunx prettier --check "app/web/src/**/*.{ts,tsx,js,json,css,md}"

      - name: Build 🔨
        run: bun run --filter web build

  server:
    name: ⚙️ Server Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:
        ${{ secrets.CI_DATABASE_URL != '' && secrets.CI_DATABASE_URL ||
        'postgresql://postgres:postgres@localhost:5432/postgres' }}
      DIRECT_URL: ${{ secrets.CI_DIRECT_URL != '' && secrets.CI_DIRECT_URL ||
        'postgresql://postgres:postgres@localhost:5432/postgres' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client 💎
        run: bun run --filter server generate

      - name: Prisma Validate 🔍
        run: bun run --filter server prisma:validate

      - name: Lint (Eslint) 🔍
        run: bun run --filter server lint

      - name: Prettier Check ✨
        run: bunx prettier --check "app/server/src/**/*.{ts,js,json,md}"

      - name: Type Check (TSC) 👀
        run: bunx tsc --noEmit -p app/server/tsconfig.json

      - name: Build 🔨
        run: bun run --filter server build
