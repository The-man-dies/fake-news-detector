name: CI

permissions:
    contents: read

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    client:
        name: 🎨 Web Checks
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./app/web
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Lint (Eslint) 🔍
              run: bun run lint

            - name: Type Check (TSC) 👀
              run: bunx tsc --noEmit

            - name: Prettier Check ✨
              run: bunx prettier --check "src/**/*.{ts,tsx,js,json,css,md}"

            - name: Build 🔨
              run: bun run build

    server:
        name: ⚙️ Server Checks
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./app/server
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Generate Prisma Client 💎
              run: bun run generate

            - name: Prisma Validate 🔍
              run: bun run prisma:validate

            - name: Lint (Eslint) 🔍
              run: bun run lint

            - name: Prettier Check ✨
              run: bunx prettier --check "src/**/*.{ts,js,json,md}"

            - name: Type Check (TSC) 👀
              run: bunx tsc --noEmit

            - name: Build 🔨
              run: bun run build
