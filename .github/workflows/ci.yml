name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (server)
        run: |
          cd app/server
          bun install

      - name: Install dependencies (web)
        run: |
          cd app/web
          npm ci

      - name: Generate Prisma client
        run: |
          cd app/server
          bunx run generate

      - name: Lint web app
        run: |
          cd app/web
          bun run lint

      - name: Build server
        run: |
          cd app/server
          bun run build

      - name: Build web app
        run: |
          cd app/web
          npm run build

      - name: Run tests (if any)
        run: |
          # Add test commands here when you have tests
          echo "No tests configured yet"
