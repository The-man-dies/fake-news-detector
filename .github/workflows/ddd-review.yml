name: DDD Multi-Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ddd-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache Ollama model
        uses: actions/cache@v4
        id: cache-ollama
        with:
          path: ~/.ollama/models
          key: ${{ runner.os }}-ollama-qwen2.5-coder-3b

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Pull model
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: ollama pull qwen2.5-coder:3b

      - name: Run DDD Review System
        run: node .github/scripts/run-agents.js  

      - name: Fail CI if HIGH severity
        run: |
          STATUS=$(cat result.json | jq -r '.status')
          if [ "$STATUS" = "FAIL" ]; then
            echo "❌ DDD violation detected"
            exit 1
          fi
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
